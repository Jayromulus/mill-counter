<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <meta name="viewport" content= "width=device-width, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Noto+Sans+PhagsPa&display=swap" rel="stylesheet">
  <title>Mill Tracker</title>
</head>
<body class="google-sans-500">
  <section class="top">
    <div id="deck"><p>Deck: <span id="deck-count">53</span></p></div>
    <div id="discard"><p>Discard: <span id="discard-count">0</span></p></div>
    <div id="reset"><p>Reset</p></div>
  </section>

  <section class="buttons">
    <div onclick id="draw"><img alt="draw" src="./assets/aesthetic-consultation.jpg" /></div>
    <div onclick id="discard-card"><img alt="discard" src="./assets/into-the-pit.jpg" /></div>
    <div onclick id="card-on-top"><img alt="card-on-top" src="./assets/the-deck-of-many-things.jpg" /></div>
    <p class="spacer"></p>
    <div onclick id="custom"><img alt="millstone" src="./assets/millstone.jpg" /></div>
    <div onclick id="jace-perfected-mind"><img alt="Jace, Perfected Mind" src="./assets/jace-perfected-mind.jpg" /></div>
    <div onclick id="surgical-extraction"><img alt="Surgical Extraction" src="./assets/surgical-extraction.jpg" /></div>
    <p class="spacer"></p>
    <div onclick id="thought-scour"><img alt="Thought Scour" src="./assets/thought-scour.jpg" /></div>
    <div onclick id="drowned-secrets"><img alt="Drowned Secrets" src="./assets/drowned-secrets.jpg" /></div>
    <div></div>
    <div onclick id="ruin-crab"><img alt="Ruin Crab" src="./assets/ruin-crab.jpg" /></div>
    <div onclick id="exhibition-tidecaller"><img alt="Exhibition Tidecaller" src="./assets/exhibition-tidecaller.jpg" /></div>
    <div></div>
    <div onclick id="stream-of-thought"><img alt="Stream of Thought" src="./assets/stream-of-thought.jpg" /></div>
    <div></div>
    <div></div>
    <div onclick id="sorcerous-squall"><img alt="Sorcerous Squall" src="./assets/sorcerous-squall.jpg" /></div>
    <div></div>
    <div></div>
    <div onclick id="archive-trap"><img alt="Archive Trap" src="./assets/archive-trap.jpg" /></div>
    <div></div>
    <div></div>
  </section>

  <div id="custom-input" class="buttons hidden">
    <div onclick id="one">1</div>
    <div onclick id="two">2</div>
    <div onclick id="three">3</div>
    <div onclick id="four">4</div>
    <div onclick id="five">5</div>
    <div onclick id="six">6</div>
    <div onclick id="seven">7</div>
    <div onclick id="eight">8</div>
    <div onclick id="nine">9</div>
    <div onclick id="modifier">-</div>
    <div onclick id="zero">0</div>
    <div onclick id="backspace">back</div>
    <div onclick id="current"></div>
    <div onclick id="submit">done</div>
  </div>

  <script src="./main.js"></script>
</body>
</html>
